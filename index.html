<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>坦克大战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background: #0a0f0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Microsoft YaHei', sans-serif;
            color: #e0e0e0;
            overflow: hidden;
        }

        .game-container {
            text-align: center;
            width: 100%;
            max-width: 850px;
            padding: 10px;
            position: relative;
        }

        h1 {
            margin-bottom: 10px;
            color: #4CAF50;
            font-size: 28px;
            letter-spacing: 6px;
            text-transform: uppercase;
            text-shadow:
                0 0 10px rgba(76, 175, 80, 0.4),
                0 0 40px rgba(76, 175, 80, 0.2);
        }

        .info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 18px;
            background: linear-gradient(180deg, #1a221a 0%, #111811 100%);
            border: 1px solid #2a3a2a;
            border-radius: 8px 8px 0 0;
            font-size: 15px;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-label {
            color: #888;
            font-size: 13px;
        }

        .info-value {
            color: #FFD700;
            font-weight: bold;
            font-size: 18px;
            min-width: 30px;
        }

        .health-bar-bg {
            width: 80px;
            height: 10px;
            background: #222;
            border-radius: 5px;
            overflow: hidden;
            border: 1px solid #333;
        }

        .health-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50, #8BC34A);
            border-radius: 5px;
            transition: width 0.3s;
            width: 100%;
        }

        .canvas-wrapper {
            position: relative;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            border: 2px solid #2a3a2a;
            border-top: none;
            border-radius: 0 0 4px 4px;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            image-rendering: pixelated;
            background: #000;
        }

        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.08) 2px,
                rgba(0, 0, 0, 0.08) 4px
            );
            z-index: 2;
        }

        .controls-pc {
            margin-top: 12px;
            color: #777;
            font-size: 13px;
        }

        .controls-pc p {
            margin: 4px 0;
        }

        .btn {
            background: linear-gradient(180deg, #4CAF50, #388E3C);
            color: white;
            border: none;
            padding: 10px 32px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 8px;
            font-family: inherit;
            letter-spacing: 2px;
            box-shadow: 0 4px 0 #2E7D32, 0 6px 12px rgba(0,0,0,0.3);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #2E7D32, 0 3px 6px rgba(0,0,0,0.3);
        }

        .controls-mobile {
            display: none;
            margin-top: 12px;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
            gap: 20px;
        }

        .dpad {
            display: grid;
            grid-template-columns: 56px 56px 56px;
            grid-template-rows: 56px 56px 56px;
            gap: 4px;
        }

        .dpad-btn {
            background: rgba(76, 175, 80, 0.12);
            border: 2px solid rgba(76, 175, 80, 0.35);
            border-radius: 12px;
            color: #4CAF50;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.1s;
        }

        .dpad-btn:active {
            background: rgba(76, 175, 80, 0.4);
            border-color: rgba(76, 175, 80, 0.7);
            color: #fff;
        }

        .dpad-empty {
            pointer-events: none;
        }

        .action-btns {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        .fire-btn {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            background: rgba(244, 67, 54, 0.15);
            border: 3px solid rgba(244, 67, 54, 0.5);
            color: #f44336;
            font-size: 16px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.1s;
            box-shadow: 0 0 20px rgba(244, 67, 54, 0.15);
        }

        .fire-btn:active {
            background: rgba(244, 67, 54, 0.45);
            border-color: rgba(244, 67, 54, 0.8);
            color: #fff;
            box-shadow: 0 0 30px rgba(244, 67, 54, 0.4);
        }

        .pause-btn {
            width: 56px;
            height: 34px;
            border-radius: 17px;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: #aaa;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .pause-btn:active {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.5);
            color: #fff;
        }

        .restart-mini {
            width: 56px;
            height: 34px;
            border-radius: 17px;
            background: rgba(76, 175, 80, 0.12);
            border: 2px solid rgba(76, 175, 80, 0.3);
            color: #4CAF50;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            margin-top: 6px;
        }

        .restart-mini:active {
            background: rgba(76, 175, 80, 0.35);
        }

        .overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 10, 5, 0.92);
            z-index: 10;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .overlay.active {
            display: flex;
        }

        .overlay h2 {
            color: #f44336;
            font-size: 42px;
            letter-spacing: 6px;
            text-shadow: 0 0 20px rgba(244, 67, 54, 0.4);
            margin-bottom: 10px;
        }

        .overlay p {
            color: #aaa;
            font-size: 16px;
            line-height: 1.8;
        }

        .overlay .final-score {
            color: #FFD700;
            font-size: 32px;
            font-weight: bold;
            margin: 10px 0;
        }

        .game-title {
            font-size: 52px;
            color: #4CAF50;
            letter-spacing: 8px;
            text-shadow:
                0 0 10px rgba(76, 175, 80, 0.5),
                0 0 60px rgba(76, 175, 80, 0.2);
            margin-bottom: 20px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        .instructions {
            background: rgba(255,255,255,0.03);
            border: 1px solid #2a3a2a;
            border-radius: 8px;
            padding: 20px 30px;
            margin-bottom: 20px;
            text-align: left;
            min-width: 260px;
        }

        .instructions h3 {
            color: #4CAF50;
            font-size: 16px;
            margin-bottom: 12px;
            text-align: center;
        }

        .instructions-row {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin: 6px 0;
            font-size: 14px;
        }

        .key {
            color: #FFD700;
            font-family: monospace;
            background: rgba(255,255,255,0.05);
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid #333;
        }

        @media (max-width: 768px) {
            h1 { font-size: 22px; letter-spacing: 2px; }
            .info { font-size: 13px; padding: 8px 12px; }
            .controls-pc { display: none; }
            .controls-mobile { display: flex; }
            .dpad { grid-template-columns: 48px 48px 48px; grid-template-rows: 48px 48px 48px; }
            .dpad-btn { font-size: 18px; }
            .fire-btn { width: 75px; height: 75px; font-size: 14px; }
            .game-title { font-size: 36px; letter-spacing: 4px; }
            .overlay h2 { font-size: 32px; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>坦克大战</h1>
        <div class="info">
            <div class="info-item">
                <span class="info-label">生命</span>
                <div class="health-bar-bg"><div class="health-bar-fill" id="livesBar"></div></div>
                <span class="info-value" id="lives">3</span>
            </div>
            <div class="info-item">
                <span class="info-label">得分</span>
                <span class="info-value" id="score">0</span>
            </div>
            <div class="info-item">
                <span class="info-label">关卡</span>
                <span class="info-value" id="level">1</span>
            </div>
        </div>
        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="800" height="600"></canvas>
            <div class="scanlines"></div>

            <div class="overlay active" id="startScreen">
                <div class="game-title">坦克大战</div>
                <div class="subtitle">BATTLE CITY REMAKE</div>
                <div class="instructions">
                    <h3>操作说明</h3>
                    <div class="instructions-row"><span>移动</span> <span><span class="key">WASD</span> / <span class="key">方向键</span></span></div>
                    <div class="instructions-row"><span>射击</span> <span><span class="key">空格</span></span></div>
                    <div class="instructions-row"><span>暂停</span> <span><span class="key">P</span></span></div>
                    <div class="instructions-row"><span>手机</span> <span>屏幕下方虚拟按键</span></div>
                </div>
                <button class="btn" onclick="game.start()">开始游戏</button>
            </div>

            <div class="overlay" id="gameOver">
                <h2>游戏结束</h2>
                <p>最终得分</p>
                <div class="final-score" id="finalScore">0</div>
                <button class="btn" onclick="game.restart(); document.getElementById('gameOver').classList.remove('active');">再来一局</button>
            </div>
        </div>
        <div class="controls-pc">
            <p>WASD / 方向键 移动 | 空格键 射击 | P 暂停</p>
            <button class="btn" onclick="game.restart()">重新开始</button>
        </div>
        <div class="controls-mobile">
            <div class="dpad">
                <div class="dpad-empty"></div>
                <div class="dpad-btn" data-key="arrowup">&#9650;</div>
                <div class="dpad-empty"></div>
                <div class="dpad-btn" data-key="arrowleft">&#9664;</div>
                <div class="dpad-empty"></div>
                <div class="dpad-btn" data-key="arrowright">&#9654;</div>
                <div class="dpad-empty"></div>
                <div class="dpad-btn" data-key="arrowdown">&#9660;</div>
                <div class="dpad-empty"></div>
            </div>
            <div class="action-btns">
                <div class="pause-btn" data-key="p">暂停</div>
                <div class="fire-btn" data-key=" ">射击</div>
                <div class="restart-mini" onclick="game.restart()">重来</div>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
